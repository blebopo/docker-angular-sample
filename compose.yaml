# Define two services: one for prod and one for dev
services:
  angular-prod:
    build: 
      context: .
      dockerfile: Dockerfile
    image: docker-angular-sample
    ports:
      - "8080:8080"
  
  angular-dev:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app
        - action: rebuild
          path: ./package.json
          target: /app
        - action: sync+restart
          path: nginix.conf
          target: /app
  
  angular-test:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    command: ["npm", "run", "test"]